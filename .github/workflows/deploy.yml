name: Deploy to Supabase

# Runs on every push to main: applies database migrations and deploys all
# Edge Functions to your Supabase project. Reads verify_jwt per function from
# supabase/config.toml (so paddle-webhook is deployed with JWT verification off).

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$PROJECT_REF"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: supabase functions deploy
